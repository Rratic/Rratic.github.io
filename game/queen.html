    <link rel="stylesheet" type="text/css" href="../css/mycss.css">

<body onload="queeninit();">
    <canvas id="queen_game" style="position:fixed;top:0;left:0;" width="512" height="576"

    <div id="buttons" style="position: absolute;top: 0;left: 512px;">

        <button type="button" onclick="check3dversion();">查看3D皇后棋</button>

    <div id="xycoordinates" style="position:absolute;top:576px;left:0;">轮到【红】方</div>
    <div id="gameinfo" style="position:absolute;top:624px;left:0;font-size:200%;">

    <footer>
        <a href="https://github.com/Rratic/Rratic.github.io" target="_blank">源代码</a>
